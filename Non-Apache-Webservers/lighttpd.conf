server.modules = (
    "mod_access",
    "mod_alias",
    "mod_fastcgi",
    "mod_redirect",
    "mod_accesslog",
    "mod_setenv"
)

server.document-root        = "/var/www/fail2ban-report"
server.errorlog             = "/var/log/lighttpd/error.log"
server.port                 = 80
server.username             = "www-data"
server.groupname            = "www-data"

# ----------------------------------------------------
# Redirect HTTP to HTTPS
# ----------------------------------------------------
$SERVER["socket"] == ":80" {
    url.redirect = ( "^/(.*)" => "https://%0/$1" )
}

# ----------------------------------------------------
# HTTPS settings (Lighttpd with TLS)
# ----------------------------------------------------
$SERVER["socket"] == ":443" {
    ssl.engine = "enable"
    ssl.pemfile = "/etc/letsencrypt/live/yourdomain.tld/fullchain.pem"
    ssl.privkey = "/etc/letsencrypt/live/yourdomain.tld/privkey.pem"

    # Directory listing off
    dir-listing.activate = "disable"

    # Block direct access to sensitive file types
    $HTTP["url"] =~ "\.(sh|ini|log|json)$" {
        url.access-deny = ( "" )
    }

    # Protect archive/
    $HTTP["url"] =~ "^/archive/" {
        url.access-deny = ( "" )
    }

    # ----------------------------------------------------
    # Endpoint protection
    # Only allow index.php, update.php, download.php, backsync.php
    # ----------------------------------------------------
    $HTTP["url"] =~ "^/endpoint/" {
        # Block everything by default
        url.access-deny = ( "" )

        # Except allowed PHP files
        $HTTP["url"] =~ "^/endpoint/(index|update|download|backsync)\.php$" {
            url.access-deny = ( )  # allow access
        }
    }

    # Block backup files
    $HTTP["url"] =~ "\.(bak|old|backup)$" {
        url.access-deny = ( "" )
    }

    # PHP-FPM FastCGI
    fastcgi.server = (
        ".php" => (
            "localhost" => (
                "socket" => "/run/php/php8.2-fpm.sock",
                "broken-scriptfilename" => "enable"
            )
        )
    )
}
